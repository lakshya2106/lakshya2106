<svg width="800" height="100" viewBox="0 0 800 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .container {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 40px;
      font-weight: 800;
      fill: #e2e8f0;
    }
    .highlight {
      fill: #00d2ff;
    }
    .cursor {
      fill: #00d2ff;
      animation: blink 1s step-end infinite;
    }
    .t1 { clip-path: polygon(0 0, 0 100%, 0 100%, 0 0); animation: type 12s infinite; }
    
    @keyframes type {
      0%, 5% { clip-path: polygon(0 0, 0 100%, 0 100%, 0 0); }
      15%, 28% { clip-path: polygon(0 0, 0 100%, 100% 100%, 100% 0); }
      33.33%, 100% { clip-path: polygon(0 0, 0 100%, 0 100%, 0 0); }
    }
    
    .g1 { animation: cycle 12s infinite 0s; }
    .g2 { animation: cycle 12s infinite 4s; }
    .g3 { animation: cycle 12s infinite 8s; }
    
    @keyframes cycle {
      0%, 32.9% { opacity: 1; }
      33%, 100% { opacity: 0; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
  
  <rect width="100%" height="100%" fill="transparent" />
  
  <g class="container">
    <g class="g1"><text x="10" y="60" class="t1">Hi, I'm <tspan class="highlight">Lakshyaraj Purbia</tspan><tspan class="cursor">_</tspan></text></g>
    <g class="g2"><text x="10" y="60" class="t1">Founder of <tspan class="highlight">Nestial</tspan><tspan class="cursor">_</tspan></text></g>
    <g class="g3"><text x="10" y="60" class="t1">I build <tspan class="highlight">Cloud Systems</tspan><tspan class="cursor">_</tspan></text></g>
  </g>
</svg>
