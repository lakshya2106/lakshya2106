<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="50%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a0ca3"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#glow)"/>
  
  <g transform="translate(200 200)">
    <polygon points="0,-100 86.6,50 -86.6,50" fill="none" stroke="url(#cyber)" stroke-width="6" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,100 -86.6,-50 86.6,-50" fill="none" stroke="#00d2ff" stroke-width="3" stroke-opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="0" cy="0" r="40" fill="url(#cyber)" opacity="0.9">
       <animate attributeName="r" values="35; 45; 35" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
